    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
const params = new URLSearchParams(window.location.search);

if (params.has('error')) {
    let msg = '';
    switch (params.get('error')) {
        case 'zle_haslo':
            msg = 'Nieprawidłowe hasło.';
            break;
        case 'nie_istnieje':
            msg = 'Użytkownik z tym e-mailem nie istnieje.';
            break;
        case 'brak_danych':
            msg = 'Wypełnij formularz logowania.';
            break;
        case 'haslo_za_krotkie':
            msg = 'Hasło musi mieć co najmniej 6 znaków.';
            break;
        case 'uzytkownik_istnieje':
            msg = 'Użytkownik o tym e-mailu już istnieje.';
            break;
        case 'blad_rejestracji':
            msg = 'Nie udało się utworzyć konta. Spróbuj ponownie.';
            break;
            case 'brak_malej_litery':
            msg = 'Hasło musi zawierać co najmniej jedną małą literę.';
            break;
            case 'brak_cyfry':
            msg = 'Hasło musi zawierać co najmniej jedną cyfrę.';
            break;
           case 'nieprawidlowe_dane':
           msg = 'Nieprawidłowe dane formularza.';
           break;
           }

    Swal.fire({
        icon: 'error',
        title: 'Błąd',
        text: msg,
        confirmButtonText: 'OK'
    });
}

if (params.get('success') === 'rejestracja_ok') {
    Swal.fire({
        icon: 'success',
        title: 'Rejestracja zakończona!',
        text: 'Możesz się teraz zalogować.',
        confirmButtonText: 'OK'
    });
}

if (params.get('success') === 'konto_usuniete') {
    Swal.fire({
        icon: 'success',
        title: 'Konto usunięte!',
        text: 'Twoje konto zostało pomyślnie usunięte.',
        confirmButtonText: 'OK'
    });
}

</script>
